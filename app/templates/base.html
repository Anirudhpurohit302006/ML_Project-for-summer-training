<!DOCTYPE html>
<html>
<head>
    <title>Adaptive Expense Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand text-white" href="/dashboard">Expense Intelligence</a>
    <div class="ms-auto">
        <a class="btn btn-sm btn-outline-light me-2" href="/profile">Profile</a>
        <a class="btn btn-sm btn-outline-light me-2" href="/expense">Add Expense</a>
        <a class="btn btn-sm btn-outline-light me-2" href="/goals">Goals</a>
        <a class="btn btn-sm btn-danger" href="/logout">Logout</a>
    </div>
</nav>

<div class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
